name: CI

# Run on pushes and PRs to the main branch.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # CPU-only torch wheel keeps the CI install small and fast.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        # The suite uses dummy data + a mocked model, so no dataset or
        # trained weights are needed in CI.
        run: pytest
